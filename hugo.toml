baseURL = 'https://mroptimist.github.io/'
languageCode = 'zh-cn'
title = 'MrOptimist'
theme = 'PaperMod'

[params]
  description = '一个用 Hugo 搭建的博客'
  author = 'MrOptimist'
  defaultTheme = 'auto'
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  secretPassword = '123456'

[menus]
  [[menus.main]]
    identifier = 'home'
    name = '首页'
    url = '/'
    weight = 10
  [[menus.main]]
    identifier = 'posts'
    name = '文章'
    url = '/posts/'
    weight = 20
  [[menus.main]]
    identifier = 'tags'
    name = '标签'
    url = '/tags/'
    weight = 30
  [[menus.main]]
    identifier = 'categories'
    name = '分类'
    url = '/categories/'
    weight = 40
  [[menus.main]]
    identifier = 'archives'
    name = '归档'
    url = '/archives/'
    weight = 50
