baseURL = 'https://mr0ptimist.github.io/'
languageCode = 'zh-cn'
title = 'MrOptimist'
theme = 'PaperMod'
paginate = 20
buildFuture = true

[params]
  description = '一个用 Hugo 搭建的博客'
  author = 'MrOptimist'
  defaultTheme = 'auto'
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = true
  secretPassword = '123456'
  mainSections = ['posts', 'local']

  [params.profileMode]
    enabled = true
    title = "Hi, 我是 MrOptimist 👋"
    subtitle = "一个技术美术。AI 真是太好用了你知道吗"

  [params.assets]
    favicon = '/favicon.ico'
    favicon16x16 = '/favicon-16x16.png'
    favicon32x32 = '/favicon-32x32.png'
    apple_touch_icon = '/apple-touch-icon.png'

[menus]
  [[menus.main]]
    identifier = 'home'
    name = '首页'
    url = '/'
    weight = 10
  [[menus.main]]
    identifier = 'posts'
    name = '文章'
    url = '/posts/'
    weight = 20
  [[menus.main]]
    identifier = 'tags'
    name = '标签'
    url = '/tags/'
    weight = 30
  [[menus.main]]
    identifier = 'categories'
    name = '分类'
    url = '/categories/'
    weight = 40
  [[menus.main]]
    identifier = 'archives'
    name = '归档'
    url = '/archives/'
    weight = 50
  [[menus.main]]
    identifier = 'local'
    name = '本地'
    url = '/local/'
    weight = 25
