{{- if site.Params.secretPassword }}
<script>
(function(){
  var secret = {{ site.Params.secretPassword }};
  var unlocked = sessionStorage.getItem('blog_secret') === secret;
  var hiddenSel = '.secret-post, .secret-term';

  if (unlocked) {
    document.querySelectorAll(hiddenSel).forEach(function(el) { el.style.display = ''; });
  }

  var modal = document.getElementById('secret-modal');
  var input = document.getElementById('secret-modal-input');
  var toggle = document.getElementById('secret-toggle');

  if (toggle) {
    toggle.addEventListener('click', function() {
      if (unlocked) {
        unlocked = false;
        sessionStorage.removeItem('blog_secret');
        document.querySelectorAll(hiddenSel).forEach(function(el) { el.style.display = 'none'; });
      } else {
        modal.style.display = 'flex';
        input.value = '';
        input.focus();
      }
    });
  }

  function tryUnlock() {
    if (input.value === secret) {
      unlocked = true;
      sessionStorage.setItem('blog_secret', secret);
      document.querySelectorAll(hiddenSel).forEach(function(el) {
        el.style.display = '';
        el.classList.add('secret-fadein');
      });
      modal.style.display = 'none';
    } else {
      input.value = '';
      input.classList.add('secret-shake');
      setTimeout(function(){ input.classList.remove('secret-shake'); }, 400);
    }
  }

  document.getElementById('secret-modal-submit').addEventListener('click', tryUnlock);
  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') tryUnlock();
  });

  modal.addEventListener('click', function(e) {
    if (e.target === modal) modal.style.display = 'none';
  });
})();
</script>
{{- end }}

<script>
(function(){
  var toc = document.querySelector('details.toc');
  if (!toc) return;
  var links = toc.querySelectorAll('a');
  if (!links.length) return;

  // Hide TOC items: keep h1 always, hide sub-headings without number prefix
  links.forEach(function(link) {
    var text = link.textContent.trim();
    // Count nesting depth: how many parent <ul> elements
    var depth = 0;
    var parent = link.parentElement;
    while (parent && parent !== toc) {
      if (parent.tagName === 'UL') depth++;
      parent = parent.parentElement;
    }
    // depth 1 = h1, depth 2 = h2, always show
    // depth 3+ = h3/h4/..., only show if starts with number
    if (depth > 2 && !/^[\d一二三四五六七八九十]/.test(text)) {
      var li = link.closest('li');
      if (li) li.style.display = 'none';
    }
  });

  // Clean up empty nested ul
  toc.querySelectorAll('ul').forEach(function(ul) {
    var visible = ul.querySelectorAll(':scope > li:not([style*="display: none"])');
    if (visible.length === 0) ul.style.display = 'none';
  });

  var headings = [];
  links.forEach(function(link) {
    var li = link.closest('li');
    if (li && li.style.display === 'none') return;
    var id = link.getAttribute('href').slice(1);
    var el = document.getElementById(id);
    if (el) headings.push({el: el, link: link});
  });

  function highlight() {
    var scrollY = window.scrollY + 100;
    var active = null;
    for (var i = headings.length - 1; i >= 0; i--) {
      if (headings[i].el.offsetTop <= scrollY) {
        active = headings[i];
        break;
      }
    }
    links.forEach(function(l) { l.classList.remove('toc-active'); });
    if (active) {
      active.link.classList.add('toc-active');
      if (toc.scrollHeight > toc.clientHeight) {
        var linkTop = active.link.offsetTop - toc.offsetTop;
        if (linkTop < toc.scrollTop || linkTop > toc.scrollTop + toc.clientHeight - 40) {
          toc.scrollTop = linkTop - toc.clientHeight / 3;
        }
      }
    }
  }

  window.addEventListener('scroll', highlight);
  highlight();
})();
</script>

<script>
(function(){
  var widthPanel = document.getElementById('width-panel');
  var widthSlider = document.getElementById('width-slider');
  var widthValue = document.getElementById('width-value');
  var widthToggle = document.getElementById('width-toggle');
  var mainEl = document.querySelector('.main');

  var saved = sessionStorage.getItem('blog_width');
  if (saved && mainEl) {
    mainEl.style.maxWidth = saved + 'px';
    widthSlider.value = saved;
    widthValue.textContent = saved;
  } else if (mainEl) {
    mainEl.style.maxWidth = widthSlider.value + 'px';
  }

  if (widthToggle) {
    widthToggle.addEventListener('click', function() {
      widthPanel.style.display = widthPanel.style.display === 'flex' ? 'none' : 'flex';
    });
  }

  widthSlider.addEventListener('input', function() {
    var v = widthSlider.value;
    widthValue.textContent = v;
    if (mainEl) mainEl.style.maxWidth = v + 'px';
    sessionStorage.setItem('blog_width', v);
  });

  widthPanel.addEventListener('click', function(e) {
    if (e.target === widthPanel) widthPanel.style.display = 'none';
  });

  // TOC width slider
  var tocWidthSlider = document.getElementById('toc-width-slider');
  var tocWidthValue = document.getElementById('toc-width-value');
  var tocEl = document.querySelector('details.toc');

  var savedToc = sessionStorage.getItem('blog_toc_width');
  if (savedToc && tocEl) {
    tocEl.style.width = savedToc + 'px';
    tocWidthSlider.value = savedToc;
    tocWidthValue.textContent = savedToc;
  }

  tocWidthSlider.addEventListener('input', function() {
    var v = tocWidthSlider.value;
    tocWidthValue.textContent = v;
    if (tocEl) tocEl.style.width = v + 'px';
    sessionStorage.setItem('blog_toc_width', v);
  });
})();
</script>

<script>
(function(){
  var c = document.querySelector('.post-content');
  if (!c) return;

  // ====== DDS Parser ======
  var DDS = (function(){
    function r8(buf, off) { return buf[off]; }
    function r32(buf, off) { return (buf[off])|(buf[off+1]<<8)|(buf[off+2]<<16)|(buf[off+3]<<24); }
    function str4(buf, off) { return String.fromCharCode(r8(buf,off),r8(buf,off+1),r8(buf,off+2),r8(buf,off+3)); }
    function c565(c) { return [((c>>11)&31)*255/31|0, ((c>>5)&63)*255/63|0, (c&31)*255/31|0]; }
    function _h2f(h) { var s=(h>>15)&1,e=(h>>10)&31,m=h&1023; if(e===0)return(s?-1:1)*Math.pow(2,-14)*(m/1024); if(e===31)return m===0?(s?-Infinity:Infinity):NaN; return(s?-1:1)*Math.pow(2,e-15)*(1+m/1024); }

        // DXGI format reference:
    //   20:D32_FLOAT_S8X24  28:R8G8B8A8_UNORM   29:R8G8B8A8_SRGB
    //   24:R10G10B10A2      35:R16G16_UNORM      49:R8G8_UNORM
    //   53:R16_TYPELESS     54:R16_FLOAT          61:R8_UNORM
    //   70-71:BC1  80-81:BC4  83-84:BC5  95-96:BC6H  98-99:BC7
    var DXGI_MAP = {
      20:'D32S8', 24:'R10G10B10A2', 28:'RGBA8', 29:'RGBA8_sRGB',
      35:'R16G16', 49:'R8G8', 53:'R16', 54:'R16F', 61:'R8',
      70:'BC1', 71:'BC1', 74:'BC3', 75:'BC3', 77:'BC3', 78:'BC3',
      80:'BC4', 81:'BC4', 83:'BC5', 84:'BC5',
      95:'BC6H', 96:'BC6H', 98:'BC7', 99:'BC7'
    };

    // bits-per-pixel for uncompressed DX10 formats (D32S8=64bit per pixel: float32 depth + uint8 stencil + 24b pad)
    var DXGI_BPP = {20:64, 24:32, 28:32, 29:32, 35:32, 49:16, 53:16, 54:16, 61:8};

    // Detect DDS pixel format from FourCC (DX10 or legacy) or legacy pixel-format masks
    function detectFmt(view) {
      var fourCC = str4(view,84);
      if (fourCC === 'DX10') {
        var dxgi = r32(view,128);
        return { fourCC:fourCC, dxgi:dxgi, type:DXGI_MAP[dxgi]||('DXGI_'+dxgi), isComp:dxgi>=70, bpp:DXGI_BPP[dxgi]||0 };
      }
      if (fourCC === 'DXT1') return { fourCC:fourCC, dxgi:71, type:'BC1', isComp:true, bpp:4 };
      if (fourCC === 'DXT3') return { fourCC:fourCC, dxgi:75, type:'BC3', isComp:true, bpp:8 };
      if (fourCC === 'DXT5') return { fourCC:fourCC, dxgi:77, type:'BC3', isComp:true, bpp:8 };
      if (fourCC === 'ATI1') return { fourCC:fourCC, dxgi:80, type:'BC4', isComp:true, bpp:4 };
      if (fourCC === 'ATI2') return { fourCC:fourCC, dxgi:83, type:'BC5', isComp:true, bpp:8 };
      var bc = r32(view,88), rmask = r32(view,92), gmask = r32(view,96), bmask = r32(view,100), amask = r32(view,104);
      if (bc===32 && rmask===0xFF && gmask===0xFF00 && bmask===0xFF0000 && amask===0xFF000000)
        return { fourCC:fourCC, dxgi:28, type:'RGBA8', isComp:false, bpp:32 };
      if (bc===32 && rmask===0x3FF && gmask===0xFFC00 && bmask===0x3FF00000)
        return { fourCC:fourCC, dxgi:24, type:'R10G10B10A2', isComp:false, bpp:32 };
      if (bc===32 && (rmask===0xFFFF||rmask===0x0000FFFF) && (gmask===0xFFFF0000||gmask===0xFFFF0000))
        return { fourCC:fourCC, dxgi:35, type:'R16G16', isComp:false, bpp:32 };
      if (bc===16 && rmask===0xFF && gmask===0xFF00)
        return { fourCC:fourCC, dxgi:49, type:'R8G8', isComp:false, bpp:16 };
      if (bc===8 && rmask===0xFF)
        return { fourCC:fourCC, dxgi:61, type:'R8', isComp:false, bpp:8 };
      if (bc===32) return { fourCC:fourCC, dxgi:28, type:'RGBA8', isComp:false, bpp:32 };
      return { fourCC:fourCC, dxgi:0, type:'UNKNOWN', isComp:false, bpp:32 };
    }

    // Parse DDS file: header + DX10 extended header, build mip offset table
    function parse(buf) {
      // Wrap ArrayBuffer in typed view (ArrayBuffer[off] returns undefined!)
      var view = new Uint8Array(buf);
      if (str4(view,0) !== 'DDS ') return null;
      var w = r32(view,16), h = r32(view,12), mips, flags = r32(view,8);
      // DDSD_MIPMAPCOUNT (0x20000): only trust header mip count when flag is set
      if (flags & 0x20000) {
        mips = Math.max(r32(view,28), 1);
      } else {
        mips = Math.floor(Math.log2(Math.max(w, h))) + 1;
      }
      var fmt = detectFmt(view);
      var dataOff = fmt.fourCC === 'DX10' ? 148 : 128;

      // Read DX10 misc flags + array size (for cubemap/texture arrays)
      var dx10Misc = 0, dx10Array = 1;
      if (fmt.fourCC === 'DX10') {
        dx10Misc = r32(view, 136);
        dx10Array = Math.max(r32(view, 140), 1);
      }

      var mipOff = dataOff, mipList = [];
      for (var i = 0; i < mips; i++) {
        var mw = Math.max(1, w>>i), mh = Math.max(1, h>>i);
        var size;
        if (fmt.isComp) {
          var bs = (fmt.type==='BC1'||fmt.type==='BC4') ? 8 : 16;
          size = Math.max(1,(mw+3)/4|0) * Math.max(1,(mh+3)/4|0) * bs;
        } else {
          size = mw * mh * (fmt.bpp / 8);
        }
        // Stop if we'd read past the buffer
        if (mipOff + size > buf.byteLength) break;
        mipList.push({off:mipOff, size:size, w:mw, h:mh});
        mipOff += size;
      }
      mips = mipList.length;
      // Detect array/cubemap: cubemap=6 faces, or DX10 array_size>1, or compute from data size
      var faceByteSize = mipOff - dataOff;
      var arraySize = 1;
      if (dx10Misc & 0x4) arraySize = 6; // DDS_RESOURCE_MISC_TEXTURECUBE
      else if (dx10Array > 1) arraySize = dx10Array;
      // Heuristic: if data has more than one face worth, use that count (catches cubemaps where DX10 header arraySize=1)
      var totalFaces = Math.floor((buf.byteLength - dataOff) / faceByteSize);
      if (totalFaces > arraySize) arraySize = totalFaces;
      // arraySize can be overridden by JSON sidecar later
      return {
        w:w, h:h, mips:mips, fmt:fmt, raw: new Uint8Array(buf), mipList:mipList,
        arraySize: arraySize, faceByteSize: faceByteSize,
        // Decode a single mip level to RGBA8 Uint8ClampedArray
        // slice: optional array/cubemap face index (0-based)
        getMip: function(n, slice) {
          if (n < 0 || n >= this.mips) return null;
          slice = slice || 0;
          if (slice < 0 || slice >= this.arraySize) return null;
          var m = this.mipList[n];
          var off = m.off + slice * this.faceByteSize;
          if (off + m.size > this.raw.byteLength) return null;
          var px = new Uint8ClampedArray(m.w * m.h * 4);
          var data = new Uint8Array(this.raw.buffer, off, m.size);
          var type = this.fmt.type;

          // -- Compressed formats --
          if (this.fmt.isComp) {
            // BC1-5: software decode on CPU
            if (type==='BC1'||type==='BC3'||type==='BC4'||type==='BC5')
              return _decodeBC(data, m.w, m.h, this.fmt);
            var glDec = _decodeBC7_WebGL(data, m.w, m.h, this.fmt);
            if (glDec) return glDec;
            // BPTC not supported → magenta placeholder
            for (var j=0;j<px.length;j+=4){px[j]=255;px[j+1]=0;px[j+2]=255;px[j+3]=255;}
            return px;
          }

          // -- Uncompressed formats --

          // 8-bit RGBA: direct copy (canvas 2D is sRGB, so data displays correctly as-is)
          if (type==='RGBA8'||type==='RGBA8_sRGB') {
            for (var j=0;j<px.length;j++) px[j]=data[j];
            return px;
          }
          // 10/10/10/2 packed in uint32: R=[0:9], G=[10:19], B=[20:29], A=[30:31]
          // Normalize: 10-bit / 1023, 2-bit / 3
          if (type==='R10G10B10A2') {
            var src32 = new Uint32Array(this.raw.buffer, m.off, m.w*m.h);
            for (var j=0;j<m.w*m.h;j++) {
              var p = src32[j];
              px[j*4]   = (p & 0x3FF) * 255 / 1023 | 0;
              px[j*4+1] = ((p>>>10) & 0x3FF) * 255 / 1023 | 0;
              px[j*4+2] = ((p>>>20) & 0x3FF) * 255 / 1023 | 0;
              px[j*4+3] = (p>>>30) * 255 / 3 | 0;
            }
            return px;
          }
          // 2×8-bit, no blue/alpha: R->R, G->G, B=0, A=255
          if (type==='R8G8') {
            for (var j=0;j<m.w*m.h;j++) {
              px[j*4]=data[j*2]; px[j*4+1]=data[j*2+1]; px[j*4+2]=0; px[j*4+3]=255;
            }
            return px;
          }
          // Single 8-bit channel → grayscale
          if (type==='R8') {
            for (var j=0;j<m.w*m.h;j++) {
              var v=data[j]; px[j*4]=v; px[j*4+1]=v; px[j*4+2]=v; px[j*4+3]=255;
            }
            return px;
          }
          // 2×16-bit UNORM: normalize 0..65535 → 0..255. Use float32 to avoid uint16 overflow!
          if (type==='R16G16') {
            var src16 = new Uint16Array(this.raw.buffer, m.off, m.w*m.h*2);
            for (var j=0;j<m.w*m.h;j++) {
              px[j*4]   = src16[j*2] * 255 / 65535 | 0;
              px[j*4+1] = src16[j*2+1] * 255 / 65535 | 0;
              px[j*4+2] = 0; px[j*4+3] = 255;
            }
            return px;
          }
          // 16-bit uint: auto-level stretch
          if (type==='R16') {
            var su16 = new Uint16Array(this.raw.buffer, m.off, m.w*m.h);
            var vmin=65535, vmax=0;
            for (var j=0;j<su16.length;j++) { if(su16[j]<vmin)vmin=su16[j]; if(su16[j]>vmax)vmax=su16[j]; }
            var range = vmax>vmin ? 255/(vmax-vmin) : 1;
            for (var j=0;j<m.w*m.h;j++) {
              var vv = (su16[j]-vmin)*range|0;
              px[j*4]=vv; px[j*4+1]=vv; px[j*4+2]=vv; px[j*4+3]=255;
            }
            return px;
          }
          // 16-bit half-float: convert to float32 first, then auto-level stretch
          if (type==='R16F') {
            var su16 = new Uint16Array(this.raw.buffer, m.off, m.w*m.h);
            var fmin=1e9, fmax=-1e9;
            for (var j=0;j<su16.length;j++) {
              var f = _h2f(su16[j]);
              if (isFinite(f)) { if (f<fmin)fmin=f; if (f>fmax)fmax=f; }
            }
            var frange = fmax>fmin ? 255/(fmax-fmin) : 1;
            for (var j=0;j<m.w*m.h;j++) {
              var vv = (_h2f(su16[j])-fmin)*frange|0;
              px[j*4]=vv; px[j*4+1]=vv; px[j*4+2]=vv; px[j*4+3]=255;
            }
            return px;
          }
          // D32_FLOAT_S8X24: 8 bytes/pixel. Even float32 indices = depth, odd = stencil padding (skip!)
          if (type==='D32S8') {
            var allF = new Float32Array(this.raw.buffer, m.off, m.w*m.h*2);
            var dmin=1e9, dmax=-1e9, n=m.w*m.h;
            for (var j=0;j<n;j++) { var dv=allF[j*2]; if(isFinite(dv)){if(dv<dmin)dmin=dv;if(dv>dmax)dmax=dv;} }
            var dr=dmax>dmin?255/(dmax-dmin):1;
            for (var j=0;j<n;j++) { var dv=isFinite(allF[j*2])?(allF[j*2]-dmin)*dr|0:0; px[j*4]=dv;px[j*4+1]=dv;px[j*4+2]=dv;px[j*4+3]=255; }
            return px;
          }
          for (var j=0;j<Math.min(px.length,data.length);j++) px[j]=data[j];
          return px;
        }
      };
    }

    // BC1 block: 2×RGB565 endpoints + 2-bit per-pixel interpolants
    function _bc1Block(src, off, dst) {
      var c0 = src[off]|(src[off+1]<<8), c1 = src[off+2]|(src[off+3]<<8);
      var col = [c565(c0), c565(c1)];
      var bits = (src[off+4])|(src[off+5]<<8)|(src[off+6]<<16)|(src[off+7]<<24);
      for (var y=0;y<4;y++) for(var x=0;x<4;x++) {
        var idx=(bits>>(2*(y*4+x)))&3, p=(y*4+x)*4;
        if (c0>c1) {
          if (idx<2) { dst[p]=col[idx][0];dst[p+1]=col[idx][1];dst[p+2]=col[idx][2];dst[p+3]=255; }
          else if (idx<3) { dst[p]=(2*col[0][0]+col[1][0])/3|0;dst[p+1]=(2*col[0][1]+col[1][1])/3|0;dst[p+2]=(2*col[0][2]+col[1][2])/3|0;dst[p+3]=255; }
          else { dst[p]=(col[0][0]+2*col[1][0])/3|0;dst[p+1]=(col[0][1]+2*col[1][1])/3|0;dst[p+2]=(col[0][2]+2*col[1][2])/3|0;dst[p+3]=255; }
        } else {
          if (idx<2) { dst[p]=col[idx][0];dst[p+1]=col[idx][1];dst[p+2]=col[idx][2];dst[p+3]=255; }
          else if (idx<3) { dst[p]=(col[0][0]+col[1][0])/2|0;dst[p+1]=(col[0][1]+col[1][1])/2|0;dst[p+2]=(col[0][2]+col[1][2])/2|0;dst[p+3]=255; }
          else { dst[p]=0;dst[p+1]=0;dst[p+2]=0;dst[p+3]=0; }
        }
      }
    }

    // BC4 block: 2×8-bit red endpoints + 3-bit per-pixel interpolants
    function _bc4Block(src, off, dst) {
      var r0=src[off], r1=src[off+1];
      var bits=0; for(var k=0;k<6;k++) bits|=src[off+2+k]<<(k*8);
      for(var y=0;y<4;y++) for(var x=0;x<4;x++) {
        var idx=(bits>>(3*(y*4+x)))&7, p=(y*4+x)*4, v;
        if (idx===0) v=r0; else if (idx===1) v=r1;
        else if (r0>r1) v=((8-idx)*r0+(idx-1)*r1)/7|0;
        else if (idx<6) v=((6-idx)*r0+(idx-1)*r1)/5|0;
        else v=idx===6?0:255;
        dst[p]=v;dst[p+1]=v;dst[p+2]=v;dst[p+3]=255;
      }
    }

    function _bc4Chan(src, off, dst, ch) {
      var r0=src[off], r1=src[off+1];
      var bits=0; for(var k=0;k<6;k++) bits|=src[off+2+k]<<(k*8);
      for(var y=0;y<4;y++) for(var x=0;x<4;x++) {
        var idx=(bits>>(3*(y*4+x)))&7, p=(y*4+x)*4;
        if (idx===0) dst[p+ch]=r0; else if (idx===1) dst[p+ch]=r1;
        else if(r0>r1) dst[p+ch]=((8-idx)*r0+(idx-1)*r1)/7|0;
        else if(idx<6) dst[p+ch]=((6-idx)*r0+(idx-1)*r1)/5|0;
        else dst[p+ch]=idx===6?0:255;
      }
    }

    // BC5 (ATI2/3Dc): two BC4 blocks — red channel + green channel (normal map compression)
    function _bc5Block(src, off, dst) { _bc4Chan(src, off, dst, 0); _bc4Chan(src, off+8, dst, 1); }

    // Dispatch block-compressed texture decode based on format
    function _decodeBC(data, w, h, fmt) {
      var out = new Uint8ClampedArray(w*h*4);
      var nbw = Math.max(1,(w+3)/4|0), nbh = Math.max(1,(h+3)/4|0);
      var fc = fmt.fourCC, dx = fmt.dxgi;
      for (var by=0;by<nbh;by++) for(var bx=0;bx<nbw;bx++) {
        var bo = (by*nbw+bx)*(fc==='DXT1'||dx===70||dx===71?8:16);
        var block = new Uint8Array(64);
        if (fc==='DXT1'||dx===70||dx===71) _bc1Block(data, bo, block);
        else if (fc==='DXT5'||dx===77||dx===78) { _bc4Block(data, bo, block); _bc1Block(data, bo+8, block); }
        else if (fc==='DXT3'||dx===74||dx===75) { for(var i=0;i<16;i++) block[i*4+3]=((data[bo+(i>>1)]>>((i&1)*4))&15)*17; _bc1Block(data, bo+8, block); }
        else if (fc==='ATI1'||dx===80||dx===81) _bc4Block(data, bo, block);

      var localBtn = document.createElement('button');
      localBtn.className = 'channel-meta-copy';
      localBtn.textContent = '本地路径';
      localBtn.addEventListener('click', function(e) {
        e.stopPropagation(); e.preventDefault();
        var localPath = ('{{ hugo.WorkingDir }}' + '/content' + decodeURI(new URL(img.src).pathname)).replace(/\//g, '\\');
        navigator.clipboard.writeText(localPath).then(function() {
          localBtn.textContent = '已复制';
          localBtn.classList.add('copied');
          setTimeout(function() { localBtn.textContent = '本地路径'; localBtn.classList.remove('copied'); }, 1500);
        });
      });
      btnRow.appendChild(browserBtn);
      btnRow.appendChild(localBtn);
      meta.appendChild(btnRow);
      wrapper.appendChild(meta);
    }).catch(function(){});
  }

  // ====== Image loader: fetch DDS/EXR → worker decode → process ======
  // Dispatch based on file extension: .dds (worker decode), .exr (worker decode), rest (native <img>)
  function loadImage(img) {
    // Skip already-processed images
    if (img.closest('.channel-container') || img.closest('a')) return;
    img._processed = true;

    // DDS (worker decodes off main thread)
    if (/\.dds$/i.test(img.src)) {
      var ddsCached = ddsCache.get(img.src);
      if (ddsCached) { processImage(img, ddsCached.dds.w, ddsCached.dds.h, ddsCached.mip0); return; }
      img.style.outline = '1px dashed #555';
      fetch(img.src).then(function(r) { if (!r.ok) return; return r.arrayBuffer(); }).then(function(buf) {
        if (!buf) return;
        // Parse header on main thread (fast)
        var dds = DDS.parse(buf);
        if (!dds) return;
        // If BC7/BC6H, decode on main thread (needs WebGL)
        if (dds.fmt.isComp && dds.fmt.type!=='BC1'&&dds.fmt.type!=='BC3'&&dds.fmt.type!=='BC4'&&dds.fmt.type!=='BC5') {
          var mip0 = dds.getMip(0);
          if (!mip0) return;
          ddsCache.set(img.src, {dds:dds, mip0:mip0});
          img.style.outline = '';
          processImage(img, dds.w, dds.h, mip0);
          return;
        }
        // Offload decode to worker
        decodeWorker.decode('dds', buf, function(result) {
          img.style.outline = '';
          if (!result.ok) return;
          ddsCache.set(img.src, {dds:dds, mip0:result.pixels});
          processImage(img, result.w, result.h, result.pixels);
        });
      }).catch(function(){ img.style.outline = ''; });
      return;
    }

    // EXR (worker decodes off main thread)
    if (/\.exr$/i.test(img.src)) {
      var exrCached = exrCache.get(img.src);
      if (exrCached) { processImage(img, exrCached.exr.w, exrCached.exr.h, exrCached.rgba8); return; }
      img.style.outline = '1px dashed #555';
      fetch(img.src).then(function(r) { if (!r.ok) return; return r.arrayBuffer(); }).then(function(buf) {
        if (!buf) return;
        decodeWorker.decode('exr', buf, function(result) {
          img.style.outline = '';
          if (!result.ok) return;
          exrCache.set(img.src, {exr:{w:result.w,h:result.h}, rgba8:result.pixels});
          processImage(img, result.w, result.h, result.pixels);
        });
      }).catch(function(){ img.style.outline = ''; });
      return;
    }

    // Standard (PNG/JPEG/WebP)
    var onload = function() {
      if (img.closest('.channel-container')) return;
      img.removeEventListener('load', onload);
      processImage(img, img.naturalWidth, img.naturalHeight, null);
    };
    if (img.complete && img.naturalWidth > 0) { onload(); }
    else { img.addEventListener('load', onload); }
  }

  // ====== Lazy Loading via IntersectionObserver ======
  // Only decode images within 800px of viewport. Fallback: load all immediately.
  // Hugo adds loading="lazy" to <img> but we need explicit control for DDS/EXR processing.
  var imgs = c.querySelectorAll('img');
  if (!imgs.length) return;

  if ('IntersectionObserver' in window) {
    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          observer.unobserve(entry.target);
          loadImage(entry.target);
        }
      });
    }, { rootMargin: '800px' });

    imgs.forEach(function(img) { observer.observe(img); });
  } else {
    // Fallback: load all immediately
    imgs.forEach(function(img) { loadImage(img); });
  }
})();


(function(){
  var postContent = document.querySelector('.post-content');
  if (!postContent) return;

  var h2s = postContent.querySelectorAll('h2');
  if (!h2s.length) return;

  h2s.forEach(function(h2) {
    var details = document.createElement('details');
    details.className = 'collapsible-section';
    details.open = true; // default open

    var summary = document.createElement('summary');
    h2.parentNode.insertBefore(details, h2);
    summary.appendChild(h2);
    details.appendChild(summary);

    var body = document.createElement('div');
    body.className = 'collapse-body';

    var sibling = details.nextSibling;
    // Collect all following siblings until next h2 or end
    while (sibling) {
      var current = sibling;
      sibling = sibling.nextSibling;
      if (current.nodeType === 1 && current.tagName === 'H2') break;
      if (current.nodeType === 1 && current.tagName === 'DETAILS' && current.classList.contains('collapsible-section')) break;
      body.appendChild(current);
    }

    details.appendChild(body);
  });

  // Restore collapse state from sessionStorage
  var path = location.pathname;
  var states = JSON.parse(sessionStorage.getItem('collapse_state') || '{}');
  if (states[path]) {
    var sections = postContent.querySelectorAll('details.collapsible-section');
    states[path].forEach(function(open, i) {
      if (sections[i]) sections[i].open = open;
    });
  }

  // Save collapse state on toggle
  document.addEventListener('toggle', function(e) {
    if (e.target.classList && e.target.classList.contains('collapsible-section')) {
      var sections = postContent.querySelectorAll('details.collapsible-section');
      var state = [];
      sections.forEach(function(s) { state.push(s.open); });
      var all = JSON.parse(sessionStorage.getItem('collapse_state') || '{}');
      all[path] = state;
      sessionStorage.setItem('collapse_state', JSON.stringify(all));
    }
  });
})();
</script>
